# Test datasource — H2 in-memory with MySQL compatibility mode
# Replace.NONE forces @DataJpaTest to use our configured datasource (with MySQL mode + NON_KEYWORDS)
spring.test.database.replace=none
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=value,year,month
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA — let Hibernate create/drop schema from entities (no Flyway in tests)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# Disable Flyway for tests
spring.flyway.enabled=false

# JWT
app.jwt.secret=minted-test-secret-key-that-is-at-least-64-characters-long-for-testing-1234
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:4200

# Jasypt (needed for context startup in controller tests)
jasypt.encryptor.password=test-jasypt-password
jasypt.encryptor.algorithm=PBEWITHHMACSHA512ANDAES_256
jasypt.encryptor.iv-generator-classname=org.jasypt.iv.RandomIvGenerator
jasypt.encryptor.key-obtention-iterations=1000

# API key encryption
app.encryption.key=test-encryption-key-32-chars-min!!
